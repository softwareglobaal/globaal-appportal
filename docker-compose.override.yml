services:
  app-telefoonregister:
    build: ./telefoonregister
    image: appportal-telefoonregister
    restart: unless-stopped
    environment:
      DB_CLIENT: better-sqlite3
      PORT: "3006"
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - telefoonregister-data:/app/data
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3006/api/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [appnet]

  # Medewerkers — forward-auth dashboard op de centrale gebruikersdatabase.
  app-medewerkers:
    build: ./medewerkers
    image: appportal-medewerkers
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Hergebruikt de read-only 'portal'-rol op de appportal-database.
      DATABASE_URL: ${APPPORTAL_DB_URL:-}
      # Smalle schrijfrol (medewerker_writer): enkel werkgever + diensten-koppeling.
      APPPORTAL_WRITE_URL: ${APPPORTAL_WRITE_URL:-}
      PORT: "3007"
      # Read-only Authentik-API voor het "Toegang"-panel (leeg = feature uit).
      # auth.<domein> resolvet intern naar nginx (netwerk-alias), dus geen hairpin.
      AUTHENTIK_API_URL: https://auth.${BASE_DOMAIN}/api/v3
      AUTHENTIK_API_TOKEN: ${MEDEWERKERS_AUTHENTIK_TOKEN:-}
      APPS_FILE: /app/apps.yaml
      # Interne telefoonregister-API voor de profielsectie "Telefoonnummers".
      TELEFOON_API_URL: http://app-telefoonregister:3006
    volumes:
      - ./apps.yaml:/app/apps.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3007/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [appnet]

  # Communicatie — telefoonnummers + e-mailadressen, gelinkt aan kern (Postgres).
  # Opvolger-in-opbouw van het telefoonregister; die app blijft ernaast draaien.
  app-communicatie:
    build: ./communicatie
    image: appportal-communicatie
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Rol 'communicatie': leest kern, schrijft schema communicatie (db/roles.sql).
      DATABASE_URL: ${COMMUNICATIE_DB_URL:-}
      PORT: "3008"
      # Wie mag bewerken (komma-gescheiden Authentik-groepen).
      EDITOR_GROUPS: communicatie-editors,admin
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3008/api/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [appnet]

volumes:
  telefoonregister-data:
