services:
  app-telefoonregister:
    build: ./telefoonregister
    image: appportal-telefoonregister
    restart: unless-stopped
    environment:
      DB_CLIENT: better-sqlite3
      PORT: "3006"
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - telefoonregister-data:/app/data
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3006/api/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [appnet]

volumes:
  telefoonregister-data:
