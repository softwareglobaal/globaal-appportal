services:
  app-telefoonregister:
    build: ./telefoonregister
    image: appportal-telefoonregister
    restart: unless-stopped
    environment:
      DB_CLIENT: better-sqlite3
      PORT: "3006"
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - telefoonregister-data:/app/data
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3006/api/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [appnet]

  # Contactsync — Google Contacts -> Xelion-adresboek (one-way, Google is
  # de bron). Eigen repo (softwareglobaal/google-xelion-sync), uitgecheckt
  # op de VM in ./contactsync met auto-deploy via deploy.sh + cron.
  # Geheime bestanden in ./contactsync-data (bind-mount /data, buiten git);
  # de env_file is required:false zodat de stack blijft werken zolang de
  # bestanden nog niet overgezet zijn.
  app-contactsync:
    build: ./contactsync
    image: appportal-contactsync
    restart: unless-stopped
    env_file:
      - path: ./contactsync-data/.env
        required: false
    volumes:
      - ./contactsync-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks: [appnet]

  # Sales — Pipedrive-dashboard (sales.globaal.be). Eigen repo
  # (softwareglobaal/sales-dashboard), uitgecheckt op de VM in ./sales met
  # auto-deploy via deploy.sh + cron (2026-07-08), zoals de andere dashboards.
  app-sales:
    build: ./sales
    image: appportal-sales
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      PORT: "3008"
      HOSTNAME: 0.0.0.0
      PIPEDRIVE_TOKEN_HARCHITECTS: ${PIPEDRIVE_TOKEN_HARCHITECTS:-}
      PIPEDRIVE_TOKEN_UNABO: ${PIPEDRIVE_TOKEN_UNABO:-}
      PIPEDRIVE_TOKEN_TKNBURO: ${PIPEDRIVE_TOKEN_TKNBURO:-}
      PIPEDRIVE_TOKEN_ENERGIEEFFICIENT: ${PIPEDRIVE_TOKEN_ENERGIEEFFICIENT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - sales-data:/app/data
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3008/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks: [appnet]

  # Medewerkers — forward-auth dashboard op de centrale gebruikersdatabase.
  app-medewerkers:
    build: ./medewerkers
    image: appportal-medewerkers
    restart: unless-stopped
    environment:
      # Toegangsgroepen naast admin/manager (bv. hr, besluit 2026-07-13).
      STAFF_GROUPS: ${ORGANISATIE_STAFF_GROUPS:-hr}
      # DeskTime-spiegel (migratie 033): API-key in .env; leeg = sync uit.
      DESKTIME_API_KEY: ${DESKTIME_API_KEY:-}
      # Octopus-spiegel (stap 4, migratie 062): standaard uit; credentials
      # in .env, OCTOPUS_ENABLED=true om de poller te starten.
      OCTOPUS_ENABLED: ${OCTOPUS_ENABLED:-false}
      OCTOPUS_SOFTWAREHOUSE_UUID: ${OCTOPUS_SOFTWAREHOUSE_UUID:-}
      OCTOPUS_USER: ${OCTOPUS_USER:-}
      OCTOPUS_PASSWORD: ${OCTOPUS_PASSWORD:-}
      OCTOPUS_SYNC_MIN: ${OCTOPUS_SYNC_MIN:-360}
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Hergebruikt de read-only 'portal'-rol op de appportal-database.
      DATABASE_URL: ${APPPORTAL_DB_URL:-}
      # Smalle schrijfrol (medewerker_writer): enkel werkgever + diensten-koppeling.
      APPPORTAL_WRITE_URL: ${APPPORTAL_WRITE_URL:-}
      PORT: "3007"
      # Read-only Authentik-API voor het "Toegang"-panel (leeg = feature uit).
      # auth.<domein> resolvet intern naar nginx (netwerk-alias), dus geen hairpin.
      AUTHENTIK_API_URL: https://auth.${BASE_DOMAIN}/api/v3
      AUTHENTIK_API_TOKEN: ${MEDEWERKERS_AUTHENTIK_TOKEN:-}
      APPS_FILE: /app/apps.yaml
      # Interne telefoonregister-API voor de profielsectie "Telefoonnummers".
      TELEFOON_API_URL: http://app-telefoonregister:3006
      # AI-lezer op de organisatie-graph (leeg = AI-paneel uit).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-5}
      # Fathom-sync: komma-gescheiden API-keys van de opnemer-accounts (leeg = uit).
      FATHOM_API_KEYS: ${FATHOM_API_KEYS:-}
      # Wie het woordenboek mag bewerken (Authentik-usernames, komma-gescheiden).
      WOORDENBOEK_EDITORS: ${WOORDENBOEK_EDITORS:-mehdi,akadmin}
    volumes:
      - ./apps.yaml:/app/apps.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3007/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [appnet]

  # Communicatie — telefoonnummers + e-mailadressen, gelinkt aan kern (Postgres).
  # Opvolger-in-opbouw van het telefoonregister; die app blijft ernaast draaien.
  app-communicatie:
    build: ./communicatie
    image: appportal-communicatie
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Rol 'communicatie': leest kern, schrijft schema communicatie (db/roles.sql).
      DATABASE_URL: ${COMMUNICATIE_DB_URL:-}
      PORT: "3008"
      # Wie mag bewerken (komma-gescheiden Authentik-groepen).
      EDITOR_GROUPS: communicatie-editors,admin
      # Xelion-koppeling (migratie 028): poller spiegelt de belvolgorde.
      # Credentials in .env op de VM (nooit in git); zonder waarden blijft
      # de Xelion-kolom leeg. XELION_DEBUG mag uit na de eerste verificatie.
      # Aan/uit via .env — bij foute creds elke 5 min blijven proberen jaagt
      # de loginFailures-teller in Xelion op (accountvergrendeling).
      XELION_ENABLED: ${XELION_ENABLED:-false}
      # Kostenadviseur (fase 2b): AI-weging via dezelfde sleutel als de
      # organisatie-app; leeg = terugval op de deterministische regels.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-5}
      XELION_DEBUG: "${XELION_DEBUG:-false}"
      XELION_BASE_URL: ${XELION_BASE_URL:-}
      XELION_USERSPACE: ${XELION_USERSPACE:-}
      XELION_USERNAME: ${XELION_USERNAME:-}
      XELION_PASSWORD: ${XELION_PASSWORD:-}
      # Optioneel; wordt volgens Xelion binnenkort verplicht (aanvragen bij Xelion).
      XELION_APP_KEY: ${XELION_APP_KEY:-}
    healthcheck:
      test: node -e "require('http').get('http://127.0.0.1:3008/api/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [appnet]

  # Vermogen — panden / verzekeringen / leningen & leasingen / syndicus (skelet).
  app-vermogen:
    build: ./vermogen
    image: appportal-vermogen
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Rol 'vermogen': leest kern, schrijft schema vermogen (db/roles.sql).
      DATABASE_URL: ${VERMOGEN_DB_URL:-}
      PORT: "3009"
      # Wie mag bewerken (komma-gescheiden Authentik-groepen).
      EDITOR_GROUPS: vermogen-editors,admin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3009/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [appnet]

  # Draaiboek — playbook-management: sjabloon -> run, kickoff, condities.
  app-draaiboek:
    build: ./draaiboek
    image: appportal-draaiboek
    restart: unless-stopped
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      # Rol 'draaiboek': leest kern, schrijft schema draaiboek (db/roles.sql).
      DATABASE_URL: ${DRAAIBOEK_DB_URL:-}
      PORT: "3010"
      # Wie de app mag gebruiken (komma-gescheiden Authentik-groepen).
      TOEGANG_GROEPEN: admin,manager,draaiboek
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3010/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [appnet]

volumes:
  telefoonregister-data:
  sales-data:
