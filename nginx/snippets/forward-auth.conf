# Authentik forward auth (embedded outpost), per
# https://docs.goauthentik.io/add-secure-apps/providers/proxy/server_nginx
# The including server block must `set $app_upstream http://<service>:<port>;`.

# Outpost auth responses carry large headers.
proxy_buffers 8 16k;
proxy_buffer_size 32k;

# Variable-based proxy_pass + Docker's DNS so container restarts
# (new IPs) don't require an nginx reload.
resolver 127.0.0.11 valid=30s;

location / {
    # Every request is validated against the Authentik session.
    auth_request     /outpost.goauthentik.io/auth/nginx;
    error_page       401 = @goauthentik_proxy_signin;
    auth_request_set $auth_cookie $upstream_http_set_cookie;
    add_header       Set-Cookie $auth_cookie;

    # Pass the authenticated identity to the application.
    auth_request_set $authentik_username $upstream_http_x_authentik_username;
    auth_request_set $authentik_groups   $upstream_http_x_authentik_groups;
    auth_request_set $authentik_email    $upstream_http_x_authentik_email;
    auth_request_set $authentik_name     $upstream_http_x_authentik_name;
    auth_request_set $authentik_uid      $upstream_http_x_authentik_uid;
    proxy_set_header X-authentik-username $authentik_username;
    proxy_set_header X-authentik-groups   $authentik_groups;
    proxy_set_header X-authentik-email    $authentik_email;
    proxy_set_header X-authentik-name     $authentik_name;
    proxy_set_header X-authentik-uid      $authentik_uid;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket support (the OMV dashboard uses SocketIO for live logs/status).
    # Harmless for apps that don't use WebSockets. $connection_upgrade is
    # defined in 00-http-redirect.conf.template.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header X-SSO-Secret $schuldentracker_sso_secret;
    proxy_pass $app_upstream;
}

location /outpost.goauthentik.io {
    # No URI part: the location prefix already matches the upstream path,
    # and a variable proxy_pass must not carry one.
    set                      $outpost_backend http://authentik-server:9000;
    proxy_pass               $outpost_backend;
    proxy_set_header         Host $host;
    proxy_set_header         X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header         X-Forwarded-Proto https;
    add_header               Set-Cookie $auth_cookie;
    auth_request_set         $auth_cookie $upstream_http_set_cookie;
    proxy_pass_request_body  off;
    proxy_set_header         Content-Length "";
}

location @goauthentik_proxy_signin {
    internal;
    add_header Set-Cookie $auth_cookie;
    return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
}
