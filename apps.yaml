# Application catalog. Echte applicaties; toegang via één groep per app.
apps:
  - id: omv
    name: OMV Pipeline
    description: Omgevingsloket scrape, PDF-merge en AI-extractie
    subdomain: omv
    roles: [admin, manager]
    status: active
  - id: schuldentracker
    name: Schuldentracker
    description: Schuldbeheer en dossiers (finance)
    subdomain: schuldentracker
    roles: [schuldentracker]
    status: active
  - id: chaos
    name: Chaos Taskforce
    description: Planning en openstaande facturen (UNABO)
    subdomain: chaos
    roles: [chaos]
    status: active
  - id: agenda
    name: Beschikbaarheid Mehdi
    description: Agenda en beschikbaarheid van Mehdi
    subdomain: agenda
    roles: [agenda-bekijken]
    status: active
  - id: telefoonregister
    name: Telefoonregister
    description: Centraal telefoonregister (single source of truth)
    subdomain: telefoonregister
    roles: [telefoonregister]
    status: active
  - id: facturatie
    name: Uitgaande Facturatie
    description: Octopus-facturen, betalingen en schijven (H-Architects)
    subdomain: facturatie
    roles: [facturatie]
    status: active
  - id: barstenscheuren
    name: Barsten & Scheuren
    description: Stabiliteitsverslagen — barsten en scheuren
    subdomain: barstenscheuren
    roles: [admin, manager, barstenscheuren]
    status: active
  - id: vermogen
    name: Vermogen
    description: Panden, verzekeringen, leningen & leasingen, syndicus
    subdomain: vermogen
    roles: [admin, manager, vermogen]
    status: active
