<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OMV Pipeline — login</title>
    <style>
        body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif;
               background: #f3f5f7; color: #1d2733; display: grid;
               place-items: center; min-height: 100vh; }
        .box { background: #fff; border: 1px solid #dde3ea; border-radius: 10px;
               padding: 2rem; width: 320px; }
        h1 { font-size: 1.2rem; margin-top: 0; }
        input { width: 100%; padding: 0.6rem; margin: 0.4rem 0 0.9rem;
                border: 1px solid #cbd3dc; border-radius: 6px; }
        button { width: 100%; padding: 0.6rem; background: #1f3a2e; color: #fff;
                 border: none; border-radius: 6px; font-size: 0.95rem; }
        .err { color: #b3261e; font-size: 0.9rem; }
        .note { color: #5b6b7d; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <form class="box" method="post">
        <h1>OMV Pipeline</h1>
        <p style="font-size:0.9rem;color:#5b6b7d;">Eigen login van de app
           (zichtbaar omdat <code>AUTH_MODE=local</code>).</p>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        <label>Wachtwoord</label>
        <input type="password" name="password" autofocus>
        <button type="submit">Inloggen</button>
        <p class="note">In SSO-modus wordt dit scherm overgeslagen.</p>
    </form>
</body>
</html>
