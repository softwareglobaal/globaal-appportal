<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organisatie · AppPortal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
    <span class="brand">AppPortal &middot; Organisatie</span>
    <nav class="topnav">
        <a class="tnav {% if tab == 'medewerkers' %}is-active{% endif %}" href="{{ url_for('index') }}">Medewerkers</a>
        <a class="tnav {% if tab == 'firmas' %}is-active{% endif %}" href="{{ url_for('firmas_lijst') }}">Firma's</a>
    </nav>
    <span class="userbox">{{ username }}<a class="apps" href="https://auth.{{ base_domain }}/if/user/">Apps</a></span>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
